<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./app-icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#404040" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('msw-theme');
          if (stored === 'sunset') stored = 'stealth';
          var valid = ['light', 'dark', 'stealth', 'monochrome', 'dopamine'];
          var theme =
            valid.indexOf(stored) !== -1
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          var darkBased = theme === 'dark';
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = darkBased ? 'dark' : 'light';
          if (darkBased) root.classList.add('dark');
          var colors = {
            light: '#404040',
            dark: '#0f172a',
            stealth: '#ffffff',
            monochrome: '#ffffff',
            dopamine: '#FFA5C8',
          };
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', colors[theme]);
        } catch (e) {}
      })();
    </script>
    <script>
      // Recover from blank screens caused by stale PWAs / missing hashed chunks after deploy.
      (function () {
        var AUTO_KEY = 'msw-boot-auto-recover-v2';
        var recoveredUi = false;

        function bustReload() {
          var url = new URL(location.href);
          url.searchParams.set('_msw_boot', String(Date.now()));
          location.replace(url.pathname + url.search + url.hash);
        }

        function purgeCachesAndReload(done) {
          var finish = typeof done === 'function' ? done : bustReload;
          if (!('serviceWorker' in navigator)) {
            if (window.caches && caches.keys) {
              caches
                .keys()
                .then(function (keys) {
                  return Promise.all(
                    keys.map(function (k) {
                      return caches.delete(k);
                    })
                  );
                })
                .then(finish, finish);
            } else {
              finish();
            }
            return;
          }
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister();
                })
              );
            })
            .then(function () {
              if (!window.caches || !caches.keys) return;
              return caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  })
                );
              });
            })
            .then(finish, finish);
        }

        function showBootRecovery(reason) {
          if (recoveredUi) return;
          recoveredUi = true;
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,sans-serif;background:#fff;color:#111;text-align:center">' +
            '<div style="max-width:28rem">' +
            '<h1 style="font-size:1.25rem;margin:0 0 8px">MSW Overwatch failed to load</h1>' +
            '<p style="margin:0 0 16px;color:#555;font-size:14px;line-height:1.45">' +
            (reason || 'A cached app update may be broken. Clear site data and reload.') +
            '</p>' +
            '<button id="msw-boot-reload" type="button" style="padding:10px 16px;font-size:14px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#111;color:#fff">' +
            'Clear cache &amp; reload</button></div></div>';
          var btn = document.getElementById('msw-boot-reload');
          if (btn) {
            btn.onclick = function () {
              try {
                sessionStorage.removeItem(AUTO_KEY);
              } catch (e) {}
              purgeCachesAndReload(bustReload);
            };
          }
        }

        function autoRecoverOrShow(reason) {
          var alreadyTried = false;
          try {
            alreadyTried = sessionStorage.getItem(AUTO_KEY) === '1';
          } catch (e) {}
          if (alreadyTried) {
            showBootRecovery(reason);
            return;
          }
          try {
            sessionStorage.setItem(AUTO_KEY, '1');
          } catch (e) {}
          // Silent one-shot recovery — most users never see the error screen.
          purgeCachesAndReload(bustReload);
        }

        function isAppAssetFailure(target) {
          if (!target) return false;
          if (target.tagName !== 'SCRIPT' && target.tagName !== 'LINK') return false;
          var src = target.src || target.href || '';
          if (!src) return false;
          try {
            var u = new URL(src, location.href);
            if (u.origin !== location.origin) return false;
            return (
              u.pathname.indexOf('/assets/') === 0 ||
              /\.(js|mjs|css)$/.test(u.pathname)
            );
          } catch (e) {
            return false;
          }
        }

        window.addEventListener(
          'error',
          function (event) {
            if (isAppAssetFailure(event && event.target)) {
              autoRecoverOrShow('A required script or stylesheet failed to load after an update.');
            }
          },
          true
        );
        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (root && !root.dataset.mswBooted && root.childElementCount === 0) {
            autoRecoverOrShow('The app stayed blank. This is often a stale installed site (PWA) cache.');
          }
        }, 8000);
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MSW Overwatch" />
    <title>MSW Overwatch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
