<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./app-icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#404040" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('msw-theme');
          if (stored === 'sunset') stored = 'stealth';
          var valid = ['light', 'dark', 'stealth', 'monochrome', 'dopamine'];
          var theme =
            valid.indexOf(stored) !== -1
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          var darkBased = theme === 'dark';
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = darkBased ? 'dark' : 'light';
          if (darkBased) root.classList.add('dark');
          var colors = {
            light: '#404040',
            dark: '#0f172a',
            stealth: '#ffffff',
            monochrome: '#ffffff',
            dopamine: '#FFA5C8',
          };
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', colors[theme]);
        } catch (e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MSW Overwatch" />
    <title>MSW Overwatch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
