<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Run reminder</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, Segoe UI, sans-serif;
        background: transparent;
        user-select: none;
        -webkit-app-region: drag;
      }
      .shell {
        box-sizing: border-box;
        height: 100%;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(251, 191, 36, 0.55);
        background: linear-gradient(180deg, #fffbeb 0%, #ffedd5 100%);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      h1 {
        margin: 8px 0 0;
        font-size: 1.2rem;
        color: #111;
      }
      p {
        margin: 8px 0 0;
        font-size: 0.85rem;
        color: #555;
        line-height: 1.4;
      }
      .actions {
        margin-top: 18px;
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary {
        background: #404040;
        color: #fff;
      }
      .secondary {
        background: #fff;
        color: #92400e;
        border: 1px solid #fcd34d;
      }
      .capy-wrap {
        height: 160px;
        width: 160px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      .capy-dance {
        animation: capy-bounce 0.7s ease-in-out infinite;
        transform-origin: bottom center;
      }
      @keyframes capy-bounce {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg);
        }
        25% {
          transform: translateY(-14px) rotate(3deg);
        }
        50% {
          transform: translateY(0) rotate(-2deg);
        }
        75% {
          transform: translateY(-10px) rotate(4deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .capy-dance {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="capy-wrap" aria-hidden="true">
        <div class="capy-dance">
          <svg viewBox="0 0 160 140" width="150" height="130">
            <ellipse cx="80" cy="128" rx="42" ry="8" fill="rgba(0,0,0,0.12)" />
            <ellipse cx="78" cy="88" rx="48" ry="32" fill="#C4A574" />
            <ellipse cx="78" cy="92" rx="40" ry="24" fill="#D4B896" />
            <ellipse cx="118" cy="62" rx="28" ry="24" fill="#C4A574" />
            <ellipse cx="124" cy="66" rx="18" ry="14" fill="#D4B896" />
            <ellipse cx="108" cy="42" rx="8" ry="10" fill="#B8956A" />
            <ellipse cx="128" cy="40" rx="7" ry="9" fill="#B8956A" />
            <circle cx="122" cy="58" r="3.2" fill="#2C2416" />
            <circle cx="134" cy="56" r="3.2" fill="#2C2416" />
            <ellipse cx="140" cy="68" rx="10" ry="8" fill="#A67C52" />
            <path d="M134 72 Q140 76 146 72" stroke="#2C2416" stroke-width="1.5" fill="none" />
            <ellipse cx="58" cy="112" rx="10" ry="14" fill="#B8956A" />
            <ellipse cx="98" cy="112" rx="10" ry="14" fill="#B8956A" />
            <path d="M118 28 L128 48 L108 48 Z" fill="#F97316" />
            <circle cx="118" cy="26" r="4" fill="#81B81D" />
          </svg>
        </div>
      </div>
      <h1 id="title">Daily Run soon!</h1>
      <p id="desc">Your cute capybara says it&apos;s almost time.</p>
      <div class="actions">
        <button type="button" class="primary" id="got-it">Got it</button>
        <button type="button" class="secondary" id="snooze">Snooze 5 min</button>
      </div>
    </div>
    <script>
      const title = document.getElementById('title')
      const desc = document.getElementById('desc')
      function applyPayload(payload) {
        if (!payload) return
        const label = payload.label || 'Daily Run'
        const mins = Math.max(1, Math.ceil((payload.secondsUntil || 0) / 60))
        title.textContent = label + ' in ~' + mins + ' min!'
        desc.textContent = payload.scheduledTime
          ? 'Scheduled: ' + payload.scheduledTime
          : "Your cute capybara says it's almost time."
      }
      if (window.capybaraOverlay) {
        window.capybaraOverlay.getPayload().then(applyPayload)
        window.capybaraOverlay.onUpdate(applyPayload)
      }
      document.getElementById('got-it').onclick = function () {
        if (window.capybaraOverlay) window.capybaraOverlay.dismiss()
      }
      document.getElementById('snooze').onclick = function () {
        if (window.capybaraOverlay) window.capybaraOverlay.snooze(5)
      }
    </script>
  </body>
</html>
