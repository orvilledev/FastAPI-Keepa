# Render Blueprint - deploy MSW Overwatch backend as a Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: metro-api
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Add all required env vars in Render Dashboard (Environment) or link as secret files.
    # Required: KEEPA_API_KEY, KEEPA_API_URL, SUPABASE_URL, SUPABASE_KEY,
    #   EMAIL_FROM, EMAIL_FROM_NAME, EMAIL_PASSWORD, EMAIL_TO,
    #   CORS_ORIGINS (e.g. https://your-frontend.vercel.app)
    # Note: cache headers for /sw.js, /index.html, and /assets/* belong on the
    # frontend host (Vercel in this setup). This backend service does not serve
    # the frontend static files.
