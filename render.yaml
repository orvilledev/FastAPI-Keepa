# Render Blueprint - deploy MSW Overwatch backend as a Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: metro-api
    rootDir: backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    # Add all required env vars in Render Dashboard (Environment) or link as secret files.
    # Required: KEEPA_API_KEY, KEEPA_API_URL, SUPABASE_URL, SUPABASE_KEY,
    #   EMAIL_FROM, EMAIL_FROM_NAME, EMAIL_PASSWORD, EMAIL_TO,
    #   CORS_ORIGINS (e.g. https://your-frontend.vercel.app)
    # Note: cache headers for /sw.js, /index.html, and /assets/* belong on the
    # frontend host (Vercel in this setup). This backend service does not serve
    # the frontend static files.
    #
    # OCR note: The Tracking Extractor in the React app runs OCR fully in the
    # browser via Tesseract.js (see frontend/src/utils/trackingExtractor.ts), so
    # this backend does NOT need a system Tesseract binary. The legacy
    # backend/app/api/tracking_scanner.py endpoints are not called by the
    # current frontend; if you ever wire them up, switch to a managed OCR API
    # or reintroduce a Docker runtime that installs `tesseract-ocr`.
